<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu | Cafe App</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { 
                        coffee: { 50: '#FDF8F5', 100: '#F2E8E3', 300: '#CBB299', 500: '#A47E5C', 700: '#6F4E37', 900: '#3C2A21' }, 
                        accent: '#E6A972' 
                    },
                    animation: { 
                        'float': 'float 6s ease-in-out infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'toast-in': 'toastIn 0.3s cubic-bezier(0.68, -0.55, 0.26, 1.55) forwards',
                        'pulse-glow': 'pulseGlow 2s infinite'
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        toastIn: { '0%': { opacity: '0', transform: 'translateY(-20px) scale(0.9)' }, '100%': { opacity: '1', transform: 'translateY(0) scale(1)' } },
                        pulseGlow: { '0%, 100%': { textShadow: '0 0 10px rgba(230,169,114,0.2)' }, '50%': { textShadow: '0 0 20px rgba(230,169,114,0.8)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FDF8F5; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(253, 248, 245, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.5); }
        
        /* 3D Immersive Product Card */
        .coffee-card { background: linear-gradient(160deg, #6F4E37 0%, #3C2A21 100%); }
        .floating-cup { filter: drop-shadow(0 20px 20px rgba(60, 42, 33, 0.5)); }
        
        .modal-overlay { background: rgba(60, 42, 33, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .progress-bar-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="text-coffee-900 h-screen w-screen flex flex-col relative overflow-hidden">

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-safe pt-4 left-0 right-0 z-[9999] flex flex-col items-center gap-2 pointer-events-none px-4"></div>

    <!-- Header -->
    <header class="px-6 pt-10 pb-4 flex justify-between items-center bg-coffee-50 z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-coffee-100 flex items-center justify-center text-xl overflow-hidden shadow-inner">
                <i class="ri-user-smile-fill text-coffee-500"></i>
            </div>
            <div>
                <p class="text-[10px] text-coffee-500 font-bold uppercase tracking-widest">Good Morning</p>
                <h1 class="font-black text-lg leading-none">Coffee Lover</h1>
            </div>
        </div>
        <button onclick="App.UI.toggleCart()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm relative text-coffee-700">
            <i class="ri-shopping-bag-3-line text-lg"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 w-4 h-4 bg-accent text-white text-[9px] font-black rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </header>

    <!-- Main Scrollable Area -->
    <main class="flex-grow overflow-y-auto no-scrollbar pb-28 px-6">
        
        <!-- Active Order Tracking Banner -->
        <div id="active-order-banner" class="hidden mb-8 bg-white p-5 rounded-3xl shadow-sm border border-coffee-100">
            <div class="flex justify-between items-center mb-4">
                <div><h3 class="font-black text-lg">Order <span id="track-id" class="text-accent">#000</span></h3><p class="text-xs text-coffee-500 font-bold">Estimated 15-20 mins</p></div>
                <div class="w-10 h-10 rounded-full bg-accent/10 text-accent flex items-center justify-center animate-pulse"><i class="ri-e-bike-2-fill text-xl"></i></div>
            </div>
            <div class="h-2 w-full bg-coffee-100 rounded-full overflow-hidden mb-2">
                <div id="track-progress" class="h-full bg-gradient-to-r from-accent to-coffee-500 progress-bar-fill w-[20%]"></div>
            </div>
            <p id="track-status" class="text-xs font-bold text-center text-coffee-700 uppercase tracking-widest">Received by Kitchen</p>
        </div>

        <h2 class="text-3xl font-black mb-6">Find the best<br>coffee for you</h2>

        <!-- Categories -->
        <div class="flex gap-3 overflow-x-auto no-scrollbar mb-10 pb-2 -mx-6 px-6" id="category-container">
            <!-- Rendered via JS -->
        </div>

        <!-- 3D Product Grid -->
        <div class="grid grid-cols-2 gap-x-4 gap-y-16 mt-12" id="menu-grid">
            <!-- Rendered via JS -->
            <div class="col-span-2 text-center py-10 text-coffee-300 font-bold hidden" id="loading-state">
                <i class="ri-loader-4-line text-3xl animate-spin mb-2 block"></i> Brewing Menu...
            </div>
        </div>

        <!-- Past Orders Section -->
        <div id="past-orders-section" class="mt-12 hidden">
            <h3 class="text-xl font-black mb-4 flex items-center gap-2"><i class="ri-history-line text-accent"></i> Order History</h3>
            <div id="past-orders-list" class="space-y-4"></div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full glass-nav px-8 py-5 flex justify-between items-center z-40 pb-safe rounded-t-[2rem]">
        <button class="text-accent flex flex-col items-center gap-1 active:scale-90 transition-transform"><i class="ri-home-5-fill text-2xl"></i></button>
        <button class="text-coffee-300 hover:text-coffee-700 flex flex-col items-center gap-1 active:scale-90 transition-transform"><i class="ri-heart-3-line text-2xl"></i></button>
        <button onclick="App.UI.toggleCart()" class="text-coffee-300 hover:text-coffee-700 flex flex-col items-center gap-1 active:scale-90 transition-transform relative">
            <i class="ri-shopping-bag-3-line text-2xl"></i>
        </button>
    </nav>

    <!-- Branding Footer -->
    <div class="fixed bottom-1 left-0 w-full text-center z-50 pointer-events-none">
        <a href="https://tusharnanwani80-rgb.github.io/seen-and-sold-check/" target="_blank" class="pointer-events-auto text-[9px] font-black uppercase tracking-[0.2em] text-coffee-300 hover:text-accent transition-colors animate-pulse-glow">
            Seen & Sold
        </a>
    </div>

    <!-- MODALS & OVERLAYS -->

    <!-- Product Detail Modal (Full Screen Slide Up) -->
    <div id="product-modal" class="fixed inset-0 modal-overlay z-[99] hidden flex-col justify-end transition-opacity opacity-0">
        <div class="bg-coffee-50 w-full h-[90vh] rounded-t-[2.5rem] relative flex flex-col transform translate-y-full transition-transform duration-300" id="product-modal-content">
            <!-- Floating Image Overlap -->
            <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-48 h-48 rounded-full border-[6px] border-coffee-50 shadow-2xl bg-white overflow-hidden z-10">
                <img id="detail-img" src="" class="w-full h-full object-cover">
            </div>
            
            <button onclick="App.UI.closeProduct()" class="absolute top-6 left-6 w-10 h-10 bg-white rounded-full flex items-center justify-center text-coffee-900 shadow-sm z-20"><i class="ri-arrow-left-line text-xl"></i></button>
            <button class="absolute top-6 right-6 w-10 h-10 bg-white rounded-full flex items-center justify-center text-coffee-900 shadow-sm z-20"><i class="ri-heart-3-line text-xl"></i></button>

            <div class="pt-28 px-6 flex-grow overflow-y-auto no-scrollbar pb-32">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-3xl font-black text-coffee-900" id="detail-name">Title</h2>
                    <span class="text-xl font-black text-coffee-700" id="detail-price">₹0</span>
                </div>
                <div class="flex items-center gap-1 text-accent text-sm font-bold mb-6">
                    <i class="ri-star-fill"></i> 4.8 <span class="text-coffee-300 font-medium ml-1">(230)</span>
                </div>

                <h4 class="text-sm font-bold text-coffee-900 mb-3">About</h4>
                <p class="text-sm text-coffee-500 font-medium leading-relaxed mb-8" id="detail-desc">Description here.</p>

                <div class="flex justify-between items-center bg-white p-2 rounded-2xl shadow-sm border border-coffee-100 w-32 mb-6">
                    <button onclick="App.Controllers.Product.qty(-1)" class="w-8 h-8 rounded-xl bg-coffee-50 text-coffee-700 flex items-center justify-center"><i class="ri-subtract-line"></i></button>
                    <span id="detail-qty" class="font-black text-lg w-8 text-center">1</span>
                    <button onclick="App.Controllers.Product.qty(1)" class="w-8 h-8 rounded-xl bg-accent text-white flex items-center justify-center"><i class="ri-add-line"></i></button>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 w-full p-6 bg-coffee-50 border-t border-white pb-10">
                <button id="btn-add-cart" onclick="App.Controllers.Product.addToCart()" class="w-full bg-accent text-white py-4 rounded-2xl font-black text-lg shadow-[0_10px_20px_rgba(230,169,114,0.3)] active:scale-95 transition-transform flex justify-center items-center gap-2">
                    Add to Cart <i class="ri-arrow-right-line"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Cart / Checkout Slide -->
    <div id="cart-modal" class="fixed inset-0 modal-overlay z-[100] hidden flex-col justify-end transition-opacity opacity-0">
        <div class="bg-white w-full h-[85vh] rounded-t-[2.5rem] relative flex flex-col transform translate-y-full transition-transform duration-300" id="cart-modal-content">
            <div class="px-6 py-6 flex justify-between items-center border-b border-coffee-50 shrink-0">
                <h2 class="text-2xl font-black text-coffee-900">Your Cart</h2>
                <button onclick="App.UI.toggleCart()" class="w-10 h-10 bg-coffee-50 rounded-full flex items-center justify-center text-coffee-600"><i class="ri-close-line text-xl"></i></button>
            </div>
            
            <div class="flex-grow overflow-y-auto p-6 space-y-4" id="cart-items-container">
                <!-- Items via JS -->
            </div>

            <div class="p-6 bg-coffee-50 rounded-t-[2rem] border-t border-white shrink-0 pb-10">
                <input type="text" id="checkout-name" placeholder="Your Name" required class="w-full px-5 py-4 rounded-xl bg-white border border-coffee-100 font-bold mb-3 focus:outline-accent outline-none">
                <input type="tel" id="checkout-phone" placeholder="Phone Number" required class="w-full px-5 py-4 rounded-xl bg-white border border-coffee-100 font-bold mb-5 focus:outline-accent outline-none">
                
                <div class="flex justify-between items-center mb-6">
                    <span class="font-bold text-coffee-500">Total Payment</span>
                    <span class="font-black text-3xl text-coffee-900" id="cart-total">₹0</span>
                </div>
                <button onclick="App.Controllers.Cart.checkout()" class="w-full bg-coffee-900 text-white py-4 rounded-2xl font-black text-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                    Place Order <i class="ri-check-line"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const App = {
            API_URL: 'https://script.google.com/macros/s/AKfycbxTorDXUgY8SvlReaot-JQjvAyGLwMvvmB4S4BO85vJbq0FFR5nhuQv9wSWIJhE4xB-/exec',
            State: {
                menu: [], activeCategory: 'All',
                cart: [], currentProduct: null, qty: 1,
                customerId: localStorage.getItem('cust_id') || ('CUST-' + Math.random().toString(36).substr(2, 9)),
                activeOrder: null, pastOrders: [], pollInterval: null
            },

            API: {
                async sync(action, payload = {}) {
                    payload.action = action;
                    try {
                        const res = await fetch(App.API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(payload)
                        });
                        return await res.json();
                    } catch(e) { console.error(e); return null; }
                },
                async fetchInitial() {
                    document.getElementById('loading-state').classList.remove('hidden');
                    const data = await this.sync("fetchCustomerData", { customerId: App.State.customerId });
                    document.getElementById('loading-state').classList.add('hidden');
                    
                    if(data && data.status === 'success') {
                        App.State.menu = data.menu;
                        App.State.activeOrder = data.activeOrder;
                        App.State.pastOrders = data.pastOrders;
                        
                        localStorage.setItem('cust_id', App.State.customerId);
                        App.Controllers.Menu.renderCategories();
                        App.Controllers.Menu.renderGrid();
                        App.Controllers.Orders.renderActive();
                        App.Controllers.Orders.renderHistory();
                        
                        if(App.State.activeOrder) this.startPolling();
                        else this.stopPolling();
                    }
                },
                startPolling() {
                    if(this.pollInterval) clearInterval(this.pollInterval);
                    this.pollInterval = setInterval(async () => {
                        const data = await this.sync("fetchCustomerData", { customerId: App.State.customerId });
                        if(data && data.status === 'success') {
                            if(data.activeOrder) {
                                // If step changed, notify
                                if(App.State.activeOrder && App.State.activeOrder.dispatchStep !== data.activeOrder.dispatchStep) {
                                    const msgs = ["", "Received by Kitchen!", "Preparing your order...", "Order is packed!", "Out for Delivery!"];
                                    App.UI.toast(msgs[data.activeOrder.dispatchStep]);
                                }
                                App.State.activeOrder = data.activeOrder;
                                App.Controllers.Orders.renderActive();
                            } else {
                                // Order complete
                                App.State.activeOrder = null;
                                App.State.pastOrders = data.pastOrders;
                                App.Controllers.Orders.renderActive();
                                App.Controllers.Orders.renderHistory();
                                App.UI.toast("Order Delivered! Enjoy.", "success");
                                this.stopPolling();
                            }
                        }
                    }, 10000); // Poll every 10 seconds
                },
                stopPolling() { clearInterval(this.pollInterval); this.pollInterval = null; }
            },

            UI: {
                toast(msg, type = "success") {
                    const c = document.getElementById('toast-container');
                    const t = document.createElement('div');
                    t.className = `bg-white/90 backdrop-blur px-5 py-3 rounded-full shadow-lg border border-white/50 flex items-center gap-2 animate-toast-in text-sm font-black`;
                    t.innerHTML = type === 'success' ? `<i class="ri-check-double-line text-green-500 text-lg"></i> ${msg}` : `<i class="ri-error-warning-fill text-accent text-lg"></i> ${msg}`;
                    c.appendChild(t);
                    setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(),300); }, 4000);
                },
                closeProduct() {
                    const m = document.getElementById('product-modal');
                    const c = document.getElementById('product-modal-content');
                    c.classList.add('translate-y-full'); m.classList.add('opacity-0');
                    setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
                },
                toggleCart() {
                    const m = document.getElementById('cart-modal');
                    const c = document.getElementById('cart-modal-content');
                    if(m.classList.contains('hidden')) {
                        App.Controllers.Cart.render();
                        m.classList.remove('hidden'); m.classList.add('flex');
                        setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('translate-y-full'); }, 10);
                    } else {
                        c.classList.add('translate-y-full'); m.classList.add('opacity-0');
                        setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
                    }
                }
            },

            Controllers: {
                Menu: {
                    renderCategories() {
                        const c = document.getElementById('category-container');
                        const cats = ['All', ...new Set(App.State.menu.map(m=>m.category))];
                        c.innerHTML = cats.map(cat => `
                            <button onclick="App.State.activeCategory='${cat}'; App.Controllers.Menu.renderGrid()" 
                                class="snap-start px-5 py-2.5 rounded-full text-sm font-bold whitespace-nowrap transition-all ${App.State.activeCategory===cat?'bg-accent text-white shadow-md':'bg-white text-coffee-500 shadow-sm'}">
                                ${cat}
                            </button>`).join('');
                    },
                    renderGrid() {
                        this.renderCategories(); // update active styling
                        const g = document.getElementById('menu-grid');
                        let items = App.State.activeCategory === 'All' ? App.State.menu : App.State.menu.filter(m => m.category === App.State.activeCategory);
                        
                        g.innerHTML = items.map(i => `
                            <div onclick="App.Controllers.Product.open('${i.id}')" class="coffee-card rounded-3xl p-4 pt-16 relative shadow-xl flex flex-col items-center cursor-pointer transform active:scale-95 transition-transform duration-300">
                                <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-28 h-28 rounded-full bg-white shadow-[0_15px_25px_rgba(60,42,33,0.4)] border-4 border-white/20 overflow-hidden flex items-center justify-center">
                                    ${i.imageUrl ? `<img src="${i.imageUrl}" class="w-full h-full object-cover">` : `<i class="ri-cup-hot-fill text-4xl text-coffee-300"></i>`}
                                </div>
                                <h3 class="text-white font-black text-lg text-center leading-tight mb-1">${i.name}</h3>
                                <div class="flex items-center gap-1 text-accent text-[10px] font-bold mb-4"><i class="ri-star-fill"></i> 4.5</div>
                                <div class="w-full flex justify-between items-center bg-white/10 rounded-2xl p-2 pl-4 backdrop-blur mt-auto">
                                    <span class="text-white font-black">₹${i.price}</span>
                                    <div class="w-8 h-8 rounded-xl bg-white text-coffee-900 flex items-center justify-center shadow-sm"><i class="ri-add-line font-black"></i></div>
                                </div>
                            </div>
                        `).join('');
                    }
                },
                Product: {
                    open(id) {
                        const item = App.State.menu.find(m=>m.id===id);
                        App.State.currentProduct = item;
                        App.State.qty = 1;
                        
                        document.getElementById('detail-img').src = item.imageUrl || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23CBB299"><path d="M2 21H22V19H2V21ZM20 8H21C22.6569 8 24 9.34315 24 11C24 12.6569 22.6569 14 21 14H20V15C20 16.6569 18.6569 18 17 18H7C5.34315 18 4 16.6569 4 15V5C4 3.89543 4.89543 3 6 3H17C18.6569 3 20 4.34315 20 6V8ZM18 5H6V15C6 15.5523 6.44772 16 7 16H17C17.5523 16 18 15.5523 18 15V5ZM20 10V12H21C21.5523 12 22 11.5523 22 11C22 10.4477 21.5523 10 21 10H20Z"></path></svg>';
                        document.getElementById('detail-name').innerText = item.name;
                        document.getElementById('detail-price').innerText = `₹${item.price}`;
                        document.getElementById('detail-desc').innerText = item.desc || "A delicious choice from our premium menu.";
                        document.getElementById('detail-qty').innerText = App.State.qty;
                        
                        const m = document.getElementById('product-modal');
                        const c = document.getElementById('product-modal-content');
                        m.classList.remove('hidden'); m.classList.add('flex');
                        setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('translate-y-full'); }, 10);
                    },
                    qty(val) {
                        App.State.qty += val;
                        if(App.State.qty < 1) App.State.qty = 1;
                        document.getElementById('detail-qty').innerText = App.State.qty;
                    },
                    addToCart() {
                        const p = App.State.currentProduct;
                        const existing = App.State.cart.find(c=>c.id===p.id);
                        if(existing) existing.qty += App.State.qty;
                        else App.State.cart.push({...p, qty: App.State.qty});
                        
                        App.UI.closeProduct();
                        App.UI.toast(`${App.State.qty}x ${p.name} added!`);
                        App.Controllers.Cart.updateBadge();
                    }
                },
                Cart: {
                    updateBadge() {
                        const b = document.getElementById('cart-badge');
                        const count = App.State.cart.reduce((s,i)=>s+i.qty, 0);
                        if(count>0) { b.innerText = count; b.classList.remove('hidden'); }
                        else b.classList.add('hidden');
                    },
                    render() {
                        const c = document.getElementById('cart-items-container');
                        if(App.State.cart.length===0) {
                            c.innerHTML = '<div class="text-center py-10 text-coffee-300 font-bold">Your cart is empty</div>';
                            document.getElementById('cart-total').innerText = '₹0';
                            return;
                        }
                        
                        let total = 0;
                        c.innerHTML = App.State.cart.map((item, idx) => {
                            total += item.price * item.qty;
                            return `
                            <div class="flex items-center gap-4 bg-white p-3 rounded-2xl shadow-sm border border-coffee-50">
                                <div class="w-16 h-16 rounded-xl bg-coffee-100 overflow-hidden shrink-0"><img src="${item.imageUrl}" class="w-full h-full object-cover"></div>
                                <div class="flex-grow">
                                    <h4 class="font-bold text-sm text-coffee-900">${item.name}</h4>
                                    <p class="font-black text-accent">₹${item.price}</p>
                                </div>
                                <div class="flex items-center gap-2 bg-coffee-50 rounded-lg p-1">
                                    <button onclick="App.Controllers.Cart.mod(${idx}, -1)" class="w-6 h-6 rounded bg-white shadow-sm flex items-center justify-center text-coffee-700 font-bold">-</button>
                                    <span class="w-4 text-center font-bold text-sm">${item.qty}</span>
                                    <button onclick="App.Controllers.Cart.mod(${idx}, 1)" class="w-6 h-6 rounded bg-white shadow-sm flex items-center justify-center text-coffee-700 font-bold">+</button>
                                </div>
                            </div>`;
                        }).join('');
                        document.getElementById('cart-total').innerText = `₹${total}`;
                    },
                    mod(idx, val) {
                        App.State.cart[idx].qty += val;
                        if(App.State.cart[idx].qty <= 0) App.State.cart.splice(idx, 1);
                        this.render(); this.updateBadge();
                    },
                    async checkout() {
                        if(App.State.cart.length===0) return App.UI.toast("Cart is empty", "error");
                        if(App.State.activeOrder) return App.UI.toast("Wait for current order to finish", "error");
                        
                        const name = document.getElementById('checkout-name').value;
                        const phone = document.getElementById('checkout-phone').value;
                        if(!name || !phone) return App.UI.toast("Please enter Name & Phone", "error");

                        const order = {
                            id: "#" + Date.now().toString().slice(-4),
                            customerId: App.State.customerId,
                            name: name, phone: phone,
                            address: "Online App Order",
                            items: App.State.cart.map(i=>({name:i.name, qty:i.qty, price:i.price})),
                            total: App.State.cart.reduce((s,i)=>s+(i.price*i.qty),0),
                            method: "ONLINE", paymentStatus: "Paid", dispatchStep: 1,
                            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                        };

                        // Optimistic UI
                        App.UI.toggleCart();
                        App.State.cart = []; this.updateBadge();
                        App.State.activeOrder = order;
                        App.Controllers.Orders.renderActive();
                        App.API.startPolling();
                        App.UI.toast("Order Placed Successfully!");

                        await App.API.sync("createOrder", {order});
                    }
                },
                Orders: {
                    renderActive() {
                        const b = document.getElementById('active-order-banner');
                        if(!App.State.activeOrder) { b.classList.add('hidden'); return; }
                        
                        b.classList.remove('hidden');
                        document.getElementById('track-id').innerText = App.State.activeOrder.id;
                        
                        const step = App.State.activeOrder.dispatchStep;
                        const w = step===1?'20%':step===2?'40%':step===3?'70%':step===4?'90%':'100%';
                        document.getElementById('track-progress').style.width = w;
                        
                        const msgs = ["", "Received by Kitchen", "Preparing your order", "Packed & Ready", "Out for Delivery"];
                        document.getElementById('track-status').innerText = msgs[step] || "Completed";
                    },
                    renderHistory() {
                        const s = document.getElementById('past-orders-section');
                        const l = document.getElementById('past-orders-list');
                        if(App.State.pastOrders.length === 0) { s.classList.add('hidden'); return; }
                        
                        s.classList.remove('hidden');
                        l.innerHTML = App.State.pastOrders.map(o => `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-coffee-50 flex justify-between items-center">
                                <div>
                                    <h4 class="font-black text-coffee-900">${o.id} <span class="text-[10px] font-bold text-coffee-400 font-normal ml-2">${o.time}</span></h4>
                                    <p class="text-xs text-coffee-500 font-medium truncate w-48">${o.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-accent mb-1">₹${o.total}</p>
                                    <button onclick="App.Controllers.Orders.reorder('${o.id}')" class="px-3 py-1 bg-coffee-50 text-coffee-700 rounded text-xs font-bold active:scale-95 transition-transform"><i class="ri-refresh-line"></i> Reorder</button>
                                </div>
                            </div>
                        `).join('');
                    },
                    reorder(id) {
                        const o = App.State.pastOrders.find(x=>x.id===id);
                        if(!o) return;
                        
                        // Map old items back to menu items to get image/details
                        App.State.cart = o.items.map(old => {
                            const menuMatch = App.State.menu.find(m => m.name === old.name);
                            return menuMatch ? {...menuMatch, qty: old.qty} : null;
                        }).filter(x=>x!==null);
                        
                        if(App.State.cart.length > 0) {
                            App.Controllers.Cart.updateBadge();
                            App.UI.toggleCart();
                            App.UI.toast("Items added to cart");
                        }
                    }
                }
            }
        };

        document.addEventListener("DOMContentLoaded", () => App.API.fetchInitial());
    </script>
</body>
</html>
